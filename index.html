</head><body><div id="root"></div><script type="module" src="/src/main.jsx"></script>
<script>
  // Regista o service worker apenas em produção (build), para não
  // interferir com o hot-reload durante o desenvolvimento local.
  if ("serviceWorker" in navigator && location.hostname !== "localhost") {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.warn("Falha ao registar o service worker:", err);
      });
    });
  }
</script>
</body></html>
