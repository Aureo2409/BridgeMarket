<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gradiente linear roxo moderno para o mapa de Angola -->
    <linearGradient id="angolaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0bdfc" stop-opacity="0.85" />
      <stop offset="50%" stop-color="#9d95f5" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#7065eb" stop-opacity="0.95" />
    </linearGradient>
    <!-- Sombra suave premium para efeito de profundidade -->
    <filter id="premiumShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#6366f1" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Corpo do Mapa com Sombra -->
  <g filter="url(#premiumShadow)">
    <!-- Cabinda -->
    <path d="M 122,50 
             L 142,42 
             C 146,44 148,49 146,54 
             L 138,70 
             C 135,73 129,72 127,67 
             Z" 
          fill="url(#angolaGradient)" />
          
    <!-- Corpo Principal de Angola -->
    <path d="M 155,75 
             C 155,75 220,72 250,75 
             C 270,77 290,75 305,82 
             C 320,89 332,105 330,122 
             C 328,135 342,145 350,155 
             C 360,167 362,185 365,200 
             C 368,215 362,228 368,242 
             C 375,258 405,260 415,275 
             C 425,290 410,315 412,330 
             C 414,345 422,358 420,372 
             C 418,388 395,395 390,410 
             C 385,425 392,442 375,455 
             C 360,465 335,460 315,458 
             C 295,456 265,465 245,460 
             C 225,455 218,440 200,442 
             C 185,444 165,458 150,455 
             C 142,453 140,440 140,430 
             C 140,410 148,390 148,370 
             C 148,340 135,320 135,290 
             C 135,270 142,250 140,230 
             C 138,210 132,192 138,172 
             C 144,152 155,135 152,115 
             C 150,100 155,85 155,75 
             Z" 
          fill="url(#angolaGradient)" />
  </g>

  <!-- O SÍMBOLO "B" COM GRÁFICO E SETA (Branco Puro) -->
  <g transform="translate(195, 125)">
    <!-- 1. As 3 Barras Ascendentes à esquerda da letra B -->
    <!-- Barra 1 (Esquerda - Curta) -->
    <path d="M 8,110 L 8,160 C 8,168 14,174 22,174 L 22,110 Z" fill="#ffffff" />
    <!-- Barra 2 (Meio - Média) -->
    <rect x="29" y="80" width="14" height="94" rx="2" fill="#ffffff" />
    <!-- Barra 3 (Direita - Longa, serve de haste principal do B) -->
    <rect x="50" y="55" width="14" height="119" rx="2" fill="#ffffff" />

    <!-- 2. A Seta de Crescimento Financeiro -->
    <!-- Haste da Seta -->
    <path d="M 12,94 L 46,55" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" />
    <!-- Cabeça da Seta -->
    <path d="M 33,52 L 48,53 L 49,68" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />

    <!-- 3. O arco de ligação inferior esquerdo (efeito 3D curvo que entra nas barras) -->
    <path d="M 8,160 C 8,180 30,210 64,210" stroke="#ffffff" stroke-width="14" stroke-linecap="round" fill="none" />

    <!-- 4. As duas barrigas da Letra B à direita -->
    <!-- Barriga Superior do B -->
    <path d="M 60,55 
             C 95,55 115,70 115,92 
             C 115,112 95,125 60,125" 
          stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          
    <!-- Barriga Inferior do B -->
    <path d="M 60,125 
             C 105,125 125,140 125,165 
             C 125,190 105,210 60,210" 
          stroke="#ffffff" stroke-width="17" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>
