<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 465" width="100%" height="100%">
  <defs>
    <linearGradient id="mapGrad" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%"   stop-color="#e2dafd"/>
      <stop offset="50%"  stop-color="#c4b5f4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════
       CABINDA — exclave superior esquerdo
       ═══════════════════════════════════ -->
  <path d="M 70,46
           C 82,36 102,34 118,43
           C 134,52 140,69 132,83
           C 124,96 106,99 90,91
           C 74,83 62,66 70,46 Z"
        fill="url(#mapGrad)"/>

  <!-- ═══════════════════════════════════
       ANGOLA — corpo principal
       ═══════════════════════════════════ -->
  <path d="
    M 104,96
    C 130,86 168,81 212,79
    C 254,77 296,79 334,84
    C 368,89 398,94 424,100
    C 442,115 450,140 450,164
    C 450,188 438,210 443,234
    C 448,256 464,274 463,300
    C 462,326 448,348 441,373
    C 434,400 438,430 418,446
    C 396,460 366,459 338,457
    C 308,455 276,449 246,446
    C 216,443 186,440 158,434
    C 130,428 100,418 84,402
    C 68,386 72,360 70,335
    C 68,310 58,286 56,261
    C 54,236 64,212 60,187
    C 56,162 44,138 52,114
    C 60,92 86,86 104,96 Z
  " fill="url(#mapGrad)"/>

  <!-- ═══════════════════════════════════
       SÍMBOLO FINANCEIRO "B + GRÁFICO"
       ═══════════════════════════════════ -->

  <!-- Barra 1 — esquerda / mais curta -->
  <rect x="148" y="316" width="27" height="86" rx="6" fill="#4c1d95"/>

  <!-- Barra 2 — meio / altura média -->
  <rect x="183" y="274" width="27" height="128" rx="6" fill="#4c1d95"/>

  <!-- Barra 3 — direita / mais alta → haste vertical do "B" -->
  <rect x="218" y="204" width="27" height="198" rx="6" fill="#4c1d95"/>

  <!-- Linha de tendência diagonal (baixo-esquerda → cima-direita) -->
  <line x1="162" y1="309" x2="228" y2="214"
        stroke="#4c1d95" stroke-width="12" stroke-linecap="round"/>

  <!-- Cabeça da seta (aponta para cima-direita) -->
  <polyline points="211,198 230,212 217,230"
            stroke="#4c1d95" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"
            fill="none"/>

  <!-- Barriga superior do "B" (mais pequena) -->
  <path d="M 245,204
           C 314,205 334,235 327,262
           C 320,286 290,298 245,298"
        stroke="#4c1d95" stroke-width="23"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Barriga inferior do "B" (maior) -->
  <path d="M 245,298
           C 322,299 346,332 339,363
           C 332,392 298,404 245,402"
        stroke="#4c1d95" stroke-width="23"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
