<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 520">

  <!-- ════════════════════════════════
       CABINDA — exclave superior
       ════════════════════════════════ -->
  <path d="M 168,22
           C 180,10 202,8 220,18
           C 238,28 244,52 233,68
           C 222,84 197,88 181,76
           C 165,64 156,44 168,22 Z"
        fill="#b39ddb"/>

  <!-- ════════════════════════════════
       ANGOLA — silhueta angular fiel
       ════════════════════════════════ -->
  <path d="
    M 68,150
    L 96,130  L 126,120  L 150,116
    L 160,132  L 184,130
    L 196,118  L 248,114  L 306,110
    L 356,108  L 390,106
    L 418,106  L 420,145  L 458,145  L 458,106
    L 498,104
    L 504,158  L 510,216  L 512,272
    L 530,272  L 532,316  L 512,316
    L 510,366  L 496,416  L 480,450
    L 414,464  L 344,470  L 274,470
    L 204,467  L 136,457  L 84,446  L 56,428
    L 44,398
    L 36,370  L 30,352  L 44,336
    L 38,308  L 40,278  L 46,248
    L 54,208  L 62,175  L 68,150 Z
  " fill="#b39ddb"/>

  <!-- ════════════════════════════════
       SÍMBOLO "B FINANCEIRO" — BRANCO
       ════════════════════════════════ -->

  <!-- Barra 1 — esquerda / mais curta -->
  <rect x="144" y="314" width="28" height="94"  rx="4" fill="#ffffff"/>

  <!-- Barra 2 — meio -->
  <rect x="180" y="264" width="28" height="144" rx="4" fill="#ffffff"/>

  <!-- Barra 3 — direita / mais alta (= haste vertical do B) -->
  <rect x="216" y="192" width="28" height="216" rx="4" fill="#ffffff"/>

  <!-- Linha de tendência diagonal (branca) -->
  <line x1="158" y1="306"
        x2="234" y2="196"
        stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>

  <!-- Cabeça da seta (triângulo branco sólido) -->
  <polygon points="245,178  240,216  210,204" fill="#ffffff"/>

  <!-- B: barriga superior (arco mais pequeno) -->
  <path d="M 244,192
           C 320,194  342,226  334,257
           C 326,285  295,301  244,301"
        stroke="#ffffff" stroke-width="27"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- B: barriga inferior (arco maior) -->
  <path d="M 244,301
           C 332,303  356,340  347,374
           C 338,406  304,408  244,408"
        stroke="#ffffff" stroke-width="27"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

</svg>
