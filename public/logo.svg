<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 470" width="100%" height="100%">
  <defs>
    <linearGradient id="mapGrad" x1="10%" y1="5%" x2="90%" y2="95%">
      <stop offset="0%"   stop-color="#ddd6fe"/>
      <stop offset="55%"  stop-color="#c4b5f4"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- ══════════════════════════════════════════
       CABINDA — exclave no canto superior esquerdo
       ══════════════════════════════════════════ -->
  <path d="M 92,44
           C 100,36 116,34 130,40
           C 144,46 150,62 143,76
           C 136,88 120,92 106,86
           C 92,80 84,62 92,44 Z"
        fill="url(#mapGrad)"/>

  <!-- ══════════════════════════════════════════
       ANGOLA — corpo principal (forma fiel)
       ══════════════════════════════════════════ -->
  <path d="
    M 148,86
    C 178,80 220,77 260,76
    C 300,75 342,78 376,88
    C 402,96 422,116 426,140
    C 430,162 418,184 424,205
    C 430,224 448,238 450,262
    C 452,285 440,307 434,330
    C 428,354 432,380 418,406
    C 402,434 370,446 340,452
    C 308,458 274,456 242,452
    C 210,448 178,440 150,426
    C 124,413 104,394 96,370
    C 88,348 94,322 90,298
    C 86,274 76,252 74,228
    C 72,204 82,182 78,158
    C 74,134 62,112 70,90
    C 78,70 104,58 128,70
    C 138,76 144,82 148,86 Z
  " fill="url(#mapGrad)"/>

  <!-- ══════════════════════════════════════════
       SÍMBOLO "B FINANCEIRO"
       ══════════════════════════════════════════ -->
  <g opacity="0.93">

    <!-- === BARRAS DO GRÁFICO (base comum y=380) === -->
    <!-- Barra 1 — esquerda, mais curta -->
    <rect x="138" y="290" width="26" height="90" rx="6" fill="#4c1d95"/>
    <!-- Barra 2 — meio -->
    <rect x="172" y="252" width="26" height="128" rx="6" fill="#4c1d95"/>
    <!-- Barra 3 — direita / haste vertical do B -->
    <rect x="206" y="196" width="26" height="184" rx="6" fill="#4c1d95"/>

    <!-- === LINHA DE TENDÊNCIA + SETA === -->
    <line x1="150" y1="283"
          x2="214" y2="204"
          stroke="#4c1d95" stroke-width="10"
          stroke-linecap="round"/>
    <!-- cabeça da seta -->
    <polyline
      points="197,188 220,202 208,226"
      stroke="#4c1d95" stroke-width="8"
      stroke-linecap="round" stroke-linejoin="round"
      fill="none"/>

    <!-- === LETRA "B" — duas barrigas à direita === -->
    <!-- Barriga superior (menor) -->
    <path d="M 232,196
             C 296,196 316,218 312,244
             C 308,268 284,284 232,284"
          stroke="#4c1d95" stroke-width="22"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <!-- Barriga inferior (maior) -->
    <path d="M 232,284
             C 300,284 324,308 320,338
             C 316,366 288,380 232,380"
          stroke="#4c1d95" stroke-width="22"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

</svg>
